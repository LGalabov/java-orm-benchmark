services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ormbench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d ormbench"]
      interval: 3s
      timeout: 3s
      retries: 10
