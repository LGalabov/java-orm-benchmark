services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ormbench
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d ormbench"]
      interval: 3s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ormbench
      MYSQL_USER: bench
      MYSQL_PASSWORD: bench
      MYSQL_ROOT_PASSWORD: rootbench
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ubench", "-pbench"]
      interval: 3s
      timeout: 3s
      retries: 10
