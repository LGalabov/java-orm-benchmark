services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  benchmark-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.benchmark
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST_PG: postgres
      DB_PORT_PG: 5432
      DB_NAME: ormbench
      DB_USER: bench
      DB_PASS: bench
    volumes:
      - ../results:/app/results
